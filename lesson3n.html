<!doctype html>
<html>
  <head>
    <style>
      button {
        padding: 10px 20px;
        border: none;
        cursor: pointer;
      }

      .uber {
        background: black;
        color: white;
      }
      .uber:hover {
        opacity: 0.7;
      }

      .amazon {
        background: rgb(255, 216, 20);
        transition: background 0.3s;
      }
      .amazon:hover {
        background: rgb(245, 205, 3);
      }

      .github {
        background: rgb(46, 164, 79);
        color: white;
        transition: box-shadow 0.3s;
      }
      .github:hover {
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
      }

      .bootstrap {
        background: rgb(121, 82, 179);
        color: white;
      }
      .bootstrap:hover {
        background: rgb(100, 70, 150);
      }

      .linkedin {
        background: rgb(10, 102, 194);
        color: white;
        border-radius: 20px;
      }
      .linkedin:hover {
        border: 2px solid black;
      }
    </style>
  </head>

  <body>
    <button class="uber">Request now</button>
    <button class="amazon">Add to Cart</button>
    <button class="github">Sign up</button>
    <button class="bootstrap">Get started</button>
    <button class="linkedin">Apply on company website</button>
  </body>
</html>
